<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌿 FLORA</title>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; background: #1a1a2e; }
    /* TLDR: Skip-to-content link for keyboard users */
    .skip-link {
      position: absolute;
      top: -100%;
      left: 0;
      background: #4caf50;
      color: #fff;
      padding: 8px 16px;
      z-index: 10000;
      font-family: Arial, sans-serif;
      font-size: 16px;
      text-decoration: none;
    }
    .skip-link:focus {
      top: 0;
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#flora-game">Skip to game</a>
  <main id="flora-game" role="application" aria-label="Flora — Cozy Gardening Game" tabindex="-1"></main>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
